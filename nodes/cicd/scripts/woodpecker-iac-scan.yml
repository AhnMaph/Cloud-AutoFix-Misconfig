# ============================================================
# .woodpecker/iac-scan.yml
# Đặt file này vào repo IaC Terraform của bạn trên Gitea
# Trigger: mọi push và pull_request
# ============================================================

when:
  event: [push, pull_request]

steps:

  # ── Step 1: Checkov scan ──────────────────────────────────
  - name: checkov-scan
    image: bridgecrew/checkov:latest
    commands:
      - echo "=== Checkov: scan Terraform AWS ==="
      # Scan toàn bộ .tf file, output JSON để OPA đọc
      - >
        checkov -d . --framework terraform
        --output json
        --soft-fail
        > /workspace/checkov-results.json 2>&1 || true
      - echo "Checkov done. Findings:"
      - cat /workspace/checkov-results.json | python3 -c
        "import json,sys; r=json.load(sys.stdin);
        print(f\"  PASSED:{len(r['results']['passed_checks'])}
        FAILED:{len(r['results']['failed_checks'])}\")"
    volumes:
      - name: workspace
        path: /workspace

  # ── Step 2: tfsec scan ───────────────────────────────────
  - name: tfsec-scan
    image: aquasec/tfsec:latest
    commands:
      - echo "=== tfsec: static security analysis ==="
      - >
        tfsec . --format json
        --soft-fail
        --out /workspace/tfsec-results.json || true
      - echo "tfsec done."
    volumes:
      - name: workspace
        path: /workspace

  # ── Step 3: Trivy scan ───────────────────────────────────
  - name: trivy-scan
    image: aquasec/trivy:latest
    commands:
      - echo "=== Trivy: CVE + secret scan ==="
      - >
        trivy config .
        --format json
        --output /workspace/trivy-results.json
        --exit-code 0 || true
      - echo "Trivy done."
    volumes:
      - name: workspace
        path: /workspace

  # ── Step 4: Merge results + POST lên OPA ─────────────────
  - name: opa-evaluate
    image: python:3.11-slim
    environment:
      OPA_URL: http://172.20.0.13:8181
      ELK_LOGSTASH_URL: http://192.168.10.13:5055
    commands:
      - pip install requests --quiet
      - python3 /workspace/opa_eval.py
    volumes:
      - name: workspace
        path: /workspace
      - name: scripts
        path: /workspace/opa_eval.py:ro

  # ── Step 5: Notify ELK (luôn chạy, kể cả khi fail) ──────
  - name: log-to-elk
    image: curlimages/curl:latest
    when:
      status: [success, failure]
    commands:
      - echo "Sending results to ELK..."
      - >
        curl -s -X POST http://192.168.10.13:5055
        -H "Content-Type: application/json"
        -d "{\"pipeline\":\"iac-scan\",
             \"commit\":\"${CI_COMMIT_SHA}\",
             \"repo\":\"${CI_REPO}\",
             \"status\":\"${CI_PIPELINE_STATUS}\"}" || true

volumes:
  - name: workspace
    temp: {}
  - name: scripts
    host:
      path: /opt/scanner-tools/opa_eval.py
