when:
  event: [push, pull_request]

steps:

  # ── Step 1: Checkov scan ──────────────────────────────────
  - name: checkov-scan
    image: bridgecrew/checkov:latest
    commands:
      - "checkov -d . --framework terraform --output json --soft-fail > checkov-results.json"
      - "echo 'Checkov scan completed'"
      - "cat checkov-results.json"

  # ── Step 2: tfsec scan ───────────────────────────────────
  - name: tfsec-scan
    image: aquasec/tfsec:latest
    commands:
      - "tfsec . --format json --no-colour --soft-fail --out tfsec-results.json"
      - "echo 'tfsec scan completed'"
      - "cat tfsec-results.json"

  # ── Step 3: Trivy scan ───────────────────────────────────
  - name: trivy-scan
    image: aquasec/trivy:latest
    commands:
      - "trivy config . --format json --output trivy-results.json --exit-code 0"
      - "echo 'Trivy scan completed'"
      - "cat trivy-results.json"
  - name: normalize-scan
    image: bridgecrew/checkov:latest # Dùng image chứa nhiều tool hoặc cài thêm python
    commands:      
      # 1. Chạy Python Normalize gộp chung vào 1 file 'normalized-results.json'
      - python3 .woodpecker/normalize_alerts.py --tool tfsec --input tfsec-results.json --output normalized-results.json
      - python3 .woodpecker/normalize_alerts.py --tool checkov --input checkov-results.json --output normalized-results.json
      - python3 .woodpecker/normalize_alerts.py --tool trivy --input trivy-results.json --output normalized-results.json
# ── Step 4: Tạo cấu trúc đếm lỗi đúng chuẩn và POST sang OPA ──────────
  - name: opa-evaluate
    image: badouralix/curl-jq:latest
    commands:
      - "echo 'Gửi yêu cầu đánh giá sang OPA...'"
      - >
        curl -s -X POST http://172.20.0.13:8181/v1/data/aws/iac
        -H "Content-Type: application/json"
        -d @normalized-results.json > opa-response.json
        
      - "cat opa-response.json"
      - "cat normalized-results.json"

# ── Step 5: Đếm tổng hợp số liệu lỗi (Metrics) và đẩy lên ELK ────────
  - name: log-to-elk
    image: badouralix/curl-jq:latest
    when:
      status: [success, failure]
    commands:
      - "echo 'Sending clean metrics to ELK Logstash...'"
      - >
        curl --fail -s -X POST http://192.168.154.129:5055
        -H "Content-Type: application/json"
        -d @normalized-results.json