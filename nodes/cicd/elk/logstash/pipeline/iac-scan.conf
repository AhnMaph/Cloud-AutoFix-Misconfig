input {
  # Nhận HTTP POST từ Woodpecker pipeline
  http {
    port => 5055
    codec => json
  }
}

filter {
  # Thêm timestamp nếu chưa có
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # Tag theo status pipeline
  if [status] == "success" {
    mutate { add_tag => ["pipeline_success"] }
  } else {
    mutate { add_tag => ["pipeline_failure"] }
  }
}

output {
  # Gửi vào Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "iac-scan-%{+YYYY.MM.dd}"  # Index theo ngày
  }

  # In ra stdout để debug
  stdout {
    codec => rubydebug
  }
}