input {
  # Mở cổng 5055 để nhận HTTP POST requests từ Woodpecker CI
  http {
    port => 5055
    codec => "json"
    # Thêm tag để dễ dàng nhận biết và tạo bộ lọc riêng trong Kibana
    tags => [ "woodpecker-iac-autofix" ]
  }
}

filter {
  # 1. Đảm bảo dữ liệu nhận được đúng là JSON (bọc lót nếu codec có lỗi)
  if "woodpecker-iac-autofix" in [tags] {
    
    # 2. Đồng bộ thời gian của hệ thống ELK trùng với thời gian sinh ra report
    # Trích xuất từ trường "timestamp": "2026-05-30T16:10:14.741017"
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
      remove_field => [ "timestamp" ] # Xóa trường cũ để tránh trùng lặp dữ liệu
    }

    # 3. Mẹo xử lý mảng (Arrays): 
    # Mặc định Elasticsearch sẽ lưu các mảng 'fix_results' và 'no_fix' dạng lồng (Nested)
    # Nếu bạn muốn vẽ biểu đồ Kibana chi tiết theo từng Check_ID hoặc Severity độc lập,
    # bạn có thể dùng lệnh split dưới đây (Không bắt buộc, cân nhắc mở ra nếu muốn phân tích sâu)
    # split { field => "fix_results" }
  }
}

output {
  # Chỉ đẩy các log có tag autofix vào index riêng
  if "woodpecker-iac-autofix" in [tags] {
    
    # In dữ liệu ra màn hình console của Docker Logstash để bạn tiện debug/xem log
    stdout { 
      codec => rubydebug 
    }

    # Đẩy dữ liệu lên Elasticsearch
    elasticsearch {
      hosts => ["http://elasticsearch:9200"] # Đổi thành tên service hoặc IP của Elasticsearch
      index => "woodpecker-iac-autofix-%{+YYYY.MM.dd}"
      # Nếu cụm ELK của bạn có bật mật khẩu, hãy bỏ comment 2 dòng dưới:
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
    }
  }
}
