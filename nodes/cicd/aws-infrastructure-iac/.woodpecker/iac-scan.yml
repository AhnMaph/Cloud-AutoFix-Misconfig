# .woodpecker/iac-pipeline.yml
#
# Prerequisites (Woodpecker UI → Repo Settings → Secrets):
#   GITEA_TOKEN  — Personal Access Token với quyền repo:write + issue:write
#   GITEA_URL    — http://192.168.154.129:3000   (hoặc domain Gitea của bạn)
#
# Woodpecker tự inject CI_REPO_OWNER, CI_REPO_NAME, CI_COMMIT_BRANCH
# vào mọi step — không cần khai báo thêm.

when:
  event: [push, pull_request]
  branch:
    exclude: [autofix/*]

variables:
  - &python_image python:3.11-slim
  - &fix_dir fix_output
  - &skip_security_gate true
  - &iac_image hybrid-iac-runner:latest
  - &fix_dir fix_output
  - &skip_security_gate true

steps:
# ── Step 0: Fetch AWS creds from Vault ─────────────────────────────────────
  - name: fetch-aws-creds-from-vault
    image: *iac_image
    pull: false
    environment:
      KEYCLOAK_TOKEN_URL:
        from_secret: KEYCLOAK_TOKEN_URL
      KEYCLOAK_CLIENT_ID:
        from_secret: KEYCLOAK_CLIENT_ID
      KEYCLOAK_CLIENT_SECRET:
        from_secret: KEYCLOAK_CLIENT_SECRET
      VAULT_ADDR:
        from_secret: VAULT_ADDR
      VAULT_JWT_ROLE:
        from_secret: VAULT_JWT_ROLE
      VAULT_AWS_ROLE:
        from_secret: VAULT_AWS_ROLE
      AWS_DEFAULT_REGION:
        from_secret: AWS_DEFAULT_REGION
    commands:
      - umask 022
      - python .woodpecker/iac-autofix/fetcher/fetch_aws_creds_from_vault.py > .env.cloud
      - chmod 0644 .env.cloud
      - test -r .env.cloud
      - ls -la .env.cloud

  - name: prepare-pipeline-context
    image: *iac_image
    pull: false
    commands:
      - test -f deploy-meta.json
      - TF_WORKDIR=$(sed -n 's/.*"tf_workdir"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' deploy-meta.json | head -1)
      - test -n "$TF_WORKDIR"
      - test -f "$TF_WORKDIR/main.tf"
      - echo "export TF_WORKDIR=\"$TF_WORKDIR\"" > .pipeline.env
      - chmod 0644 .pipeline.env .env.cloud
      - echo "Terraform workdir is $TF_WORKDIR"

  # ── Step 1: Checkov scan ──────────────────────────────────────────────────
  - name: checkov-scan
    image: *iac_image
    pull: false
    commands:
      - ls -la .env.cloud
      - test -r .env.cloud
      - set -a && . ./.env.cloud && . ./.pipeline.env && set +a
      - >
        checkov -d "$TF_WORKDIR" --framework terraform
        --output json --soft-fail
        > checkov-results.json
      - echo "✅ Checkov scan done"

  # ── Step 2: tfsec scan ───────────────────────────────────────────────────
  - name: tfsec-scan
    image: *iac_image
    pull: false
    commands:
      - ls -la .env.cloud
      - test -r .env.cloud
      - set -a && . ./.env.cloud && . ./.pipeline.env && set +a
      - >
        tfsec "$TF_WORKDIR" --format json --no-colour
        --soft-fail --out tfsec-results.json
      - echo "✅ tfsec scan done"

  # ── Step 3: Trivy scan ───────────────────────────────────────────────────
  - name: trivy-scan
    image: *iac_image
    pull: false
    commands:
      - ls -la .env.cloud
      - test -r .env.cloud
      - set -a && . ./.env.cloud && . ./.pipeline.env && set +a
      - >
        trivy config "$TF_WORKDIR" --format json
        --output trivy-results.json --exit-code 0
      - echo "✅ Trivy scan done"

  # ── Step 4: IaC Auto-Fix ─────────────────────────────────────────────────
  - name: iac-autofix
    image: *iac_image
    pull: false
    commands:
      - ls -la .env.cloud
      - test -r .env.cloud
      - set -a && . ./.env.cloud && . ./.pipeline.env && set +a
      - echo "🛠️ Running AWS IaC Auto-Fix Framework..."
      - >
        python .woodpecker/iac-autofix/autofix.py
        --tf-dir "$TF_WORKDIR"
        --checkov checkov-results.json
        --tfsec tfsec-results.json
        --trivy trivy-results.json
        --out-dir fix_output
        --severity LOW,MEDIUM
      - cat fix_output/PR_SUMMARY.md

  # ── Step 5: OPA policy check ─────────────────────────────────────────────
  - name: opa-policy-check
    image: *iac_image
    pull: false
    commands:
      - curl -i -s http://opa:8181/health || (echo "❌ OPA Server unreachable or wrong Docker network"; exit 1)
      - >
        jq -n --argjson data "$(cat fix_output/fix_report.json)" '{"input": $data}' > managed_input.json
      - cat managed_input.json
      - >
        curl --fail -s -X POST http://opa:8181/v1/data/aws/iac/main
        -H "Content-Type: application/json"
        -d @managed_input.json > opa-response.json
      - cat opa-response.json
      
      # - 'echo "TEMP TEST MODE: skipping OPA block to test Terraform deploy"'
      # - 'echo "{\"result\":[]}" > opa-response.json'
      # - 'echo "OPA temporarily forced to pass"'
  
  # ── Step 6: Terraform Plan ────────────────────────────────────────────────
  - name: terraform-plan
    image: *iac_image
    pull: false
    when:
      status: success
    commands:
      - set -a && . ./.env.cloud && . ./.pipeline.env && set +a

      - |
        if [ -f fix_output/main.tf ]; then
          echo "✅ Using auto-fixed Terraform file: fix_output/main.tf"
          cp fix_output/main.tf "$TF_WORKDIR/main.tf"
        else
          echo "ℹ️ No fixed main.tf found, using current Terraform files"
        fi

      - terraform -chdir="$TF_WORKDIR" init -input=false
      - terraform -chdir="$TF_WORKDIR" validate
      - terraform -chdir="$TF_WORKDIR" plan -input=false -out=tfplan

  # ── Step 7: Terraform Apply ───────────────────────────────────────────────
  - name: terraform-apply
    image: *iac_image
    pull: false
    when:
      event: push
      status: success
    commands:
      - set -a && . ./.env.cloud && . ./.pipeline.env && set +a
      - terraform -chdir="$TF_WORKDIR" apply -input=false -auto-approve tfplan
      - echo "✅ Terraform apply completed"

  # ── Step 8: Create Fix PR ────────────────────────────────────────────────
  # Chạy trước notify-ingress để dashboard chỉ hiện Accept Auto-Fix khi PR đã tồn tại.
  - name: create-fix-pr
    image: *iac_image
    pull: false
    when:
      event: push
      status: success
    environment:
      GITEA_URL:
        from_secret: GITEA_URL
      GITEA_TOKEN:
        from_secret: GITEA_TOKEN
    commands:
      - git config --global --add safe.directory '*'
      - echo "🚀 Creating AWS auto-fix PR if fixes were applied..."
      - python3 .woodpecker/iac-autofix/gitea_pr.py --fix-dir fix_output --report-json fix_output/fix_report.json --report-md fix_output/PR_SUMMARY.md

  # ── Step 7: Notify Ingress with OPA decision + scan summary ───────────────
  - name: notify-ingress
    image: *iac_image
    pull: false
    when:
      status: [success, failure]
    environment:
      INGRESS_CALLBACK_TOKEN:
        from_secret: INGRESS_CALLBACK_TOKEN
    commands:
      - |
        set -eu

        if [ ! -f deploy-meta.json ]; then
          echo "No deploy-meta.json found. Probably initial repo setup. Skip notify."
          exit 0
        fi

        DEPLOYMENT_ID="$(jq -r '.deployment_id // empty' deploy-meta.json)"
        CALLBACK_URL="$(jq -r '.callback_url // empty' deploy-meta.json)"
        TF_WORKDIR="$(jq -r '.tf_workdir // "."' deploy-meta.json)"
        REPO_NAME="${CI_REPO:-${CI_REPO_OWNER:-unknown}/${CI_REPO_NAME:-unknown}}"
        COMMIT_SHA="${CI_COMMIT_SHA:-unknown}"
        BRANCH_NAME="${CI_COMMIT_BRANCH:-main}"
        PIPELINE_URL="${CI_PIPELINE_URL:-}"

        if [ -z "$DEPLOYMENT_ID" ] || [ -z "$CALLBACK_URL" ]; then
          echo "Missing deployment_id or callback_url in deploy-meta.json. Skip notify."
          exit 0
        fi

        mkdir -p fix_output

        if [ ! -f fix_output/fix_report.json ]; then
          echo '{"summary":{"total":0,"fixed":0,"skipped":0,"failed":1,"manual":0,"files_patched":0}}' > fix_output/fix_report.json
        fi

        if [ ! -f fix_output/PR_SUMMARY.md ]; then
          echo "# Scan summary unavailable" > fix_output/PR_SUMMARY.md
        fi

        if [ ! -f opa-response.json ]; then
          jq -n \
            --slurpfile fix_report fix_output/fix_report.json \
            '{
              result: {
                deny: (
                  (($fix_report[0].summary.total // 0) > 0)
                  or
                  (($fix_report[0].summary.failed // 0) > 0)
                ),
                allow: (
                  (($fix_report[0].summary.total // 0) == 0)
                  and
                  (($fix_report[0].summary.failed // 0) == 0)
                ),
                fallback_reason: "opa-response.json missing"
              }
            }' > opa-response.json
        fi

        jq -n \
          --arg deployment_id "$DEPLOYMENT_ID" \
          --arg repo "$REPO_NAME" \
          --arg commit "$COMMIT_SHA" \
          --arg branch "$BRANCH_NAME" \
          --arg tf_workdir "$TF_WORKDIR" \
          --arg pipeline_url "$PIPELINE_URL" \
          --rawfile summary_markdown fix_output/PR_SUMMARY.md \
          --slurpfile fix_report fix_output/fix_report.json \
          --slurpfile opa_response opa-response.json \
          '{
            deployment_id: $deployment_id,
            repo: $repo,
            commit: $commit,
            branch: $branch,
            tf_workdir: $tf_workdir,
            pipeline_url: $pipeline_url,
            opa: {
              deny: (
                $opa_response[0].result.deny //
                (
                  if ($opa_response[0].result.allow? != null)
                  then (if $opa_response[0].result.allow then false else true end)
                  else (
                    (($fix_report[0].summary.total // 0) > 0)
                    or
                    (($fix_report[0].summary.failed // 0) > 0)
                  )
                  end
                )
              ),
              allow: (
                $opa_response[0].result.allow //
                (
                  if ($opa_response[0].result.deny? != null)
                  then (if $opa_response[0].result.deny then false else true end)
                  else (
                    (($fix_report[0].summary.total // 0) == 0)
                    and
                    (($fix_report[0].summary.failed // 0) == 0)
                  )
                  end
                )
              ),
              summary: ($opa_response[0].result.summary // {})
            },
            summary_markdown: $summary_markdown,
            fix_report: $fix_report[0]
          }' > ingress-payload.json

        echo "===== ingress-payload.json ====="
        cat ingress-payload.json

        curl -k --fail -s -X POST "$CALLBACK_URL" \
          -H "Content-Type: application/json" \
          -H "X-CI-Token: $INGRESS_CALLBACK_TOKEN" \
          -d @ingress-payload.json

        echo "✅ AWS OPA decision + scan summary sent to Ingress"

  # ── Step 9: Log to ELK ───────────────────────────────────────────────────
  - name: log-to-elk
    image: *iac_image
    pull: false
    when:
      status: [success, failure]
    commands:
      - echo "📤 Sending AWS scan metrics to ELK Logstash..."
      - >
        curl --fail -s -X POST http://logstash:5055
        -H "Content-Type: application/json"
        -d @fix_output/fix_report.json
      - cat fix_output/fix_report.json
      - echo "✅ Logs successfully pushed to ELK"