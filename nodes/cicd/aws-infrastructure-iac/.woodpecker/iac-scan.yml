# .woodpecker/iac-pipeline.yml
#
# Prerequisites (Woodpecker UI → Repo Settings → Secrets):
#   GITEA_TOKEN  — Personal Access Token với quyền repo:write + issue:write
#   GITEA_URL    — http://192.168.154.129:3000   (hoặc domain Gitea của bạn)
#
# Woodpecker tự inject CI_REPO_OWNER, CI_REPO_NAME, CI_COMMIT_BRANCH
# vào mọi step — không cần khai báo thêm.

when:
  event: [push, pull_request]
  # Chỉ chạy auto-fix + PR khi push lên main/develop, không phải branch autofix/*
  # (tránh vòng lặp vô hạn)
  branch:
    exclude: [autofix/*]

variables:
  # Dùng lại image string ở nhiều chỗ
  - &python_image  python:3.11-slim
  - &fix_dir       fix_output

steps:
  # ── Step 1: Checkov scan ──────────────────────────────────────────────────
  - name: checkov-scan
    image: bridgecrew/checkov:latest
    commands:
      - >
        checkov -d . --framework terraform
        --output json --soft-fail
        > checkov-results.json
      - echo "✅ Checkov scan done"

  # ── Step 2: tfsec scan ───────────────────────────────────────────────────
  - name: tfsec-scan
    image: aquasec/tfsec:latest
    commands:
      - >
        tfsec . --format json --no-colour
        --soft-fail --out tfsec-results.json
      - echo "✅ tfsec scan done"

  # ── Step 3: Trivy scan ───────────────────────────────────────────────────
  - name: trivy-scan
    image: aquasec/trivy:latest
    commands:
      - >
        trivy config . --format json
        --output trivy-results.json --exit-code 0
      - echo "✅ Trivy scan done"

  # ── Step 4: IaC Auto-Fix ─────────────────────────────────────────────────
  - name: iac-autofix
    image: *python_image
    commands:
      - pip install -q colorama
      - echo "🛠️ Running IaC Auto-Fix Framework..."
      - >
        python .woodpecker/iac-autofix/autofix.py
        --tf-dir .
        --checkov checkov-results.json
        --tfsec   tfsec-results.json
        --trivy   trivy-results.json
        --out-dir fix_output
        --severity LOW,MEDIUM
      - cat fix_output/PR_SUMMARY.md
  
  # ── Step 5: OPA policy check ─────────────────────────────────────────────
  - name: opa-policy-check
    image: badouralix/curl-jq:latest
    commands:
      - curl -i -s http://opa:8181/health || (echo "❌ OPA Server sập nguồn hoặc sai cấu hình mạng!"; exit 1)
      - >
        jq -n --argjson data "$(cat fix_output/fix_report.json)" '{"input": $data}' > managed_input.json
      # 2. Bắn dữ liệu sang endpoint /main để nhận kết quả rút gọn (allow, deny, summary)
      - >
        curl --fail -s -X POST http://opa:8181/v1/data/aws/iac/main
        -H "Content-Type: application/json"
        -d @managed_input.json > opa-response.json
      - cat managed_input.json
      - cat opa-response.json

  # ── Step 6: Notify Ingress with OPA decision + scan summary ───────────────
  - name: notify-ingress
    image: badouralix/curl-jq:latest
    when:
      status: [success, failure]
    environment:
      INGRESS_CALLBACK_TOKEN:
        from_secret: INGRESS_CALLBACK_TOKEN
    commands:
      - |
        set -eu

        if [ ! -f deploy-meta.json ]; then
          echo "No deploy-meta.json found. Probably initial repo setup. Skip notify."
          exit 0
        fi

        DEPLOYMENT_ID="$(jq -r '.deployment_id // empty' deploy-meta.json)"
        CALLBACK_URL="$(jq -r '.callback_url // empty' deploy-meta.json)"
        TF_WORKDIR="$(jq -r '.tf_workdir // "."' deploy-meta.json)"
        REPO_NAME="${CI_REPO:-${CI_REPO_OWNER:-unknown}/${CI_REPO_NAME:-unknown}}"
        COMMIT_SHA="${CI_COMMIT_SHA:-unknown}"
        BRANCH_NAME="${CI_COMMIT_BRANCH:-main}"
        PIPELINE_URL="${CI_PIPELINE_URL:-}"

        if [ -z "$DEPLOYMENT_ID" ] || [ -z "$CALLBACK_URL" ]; then
          echo "Missing deployment_id or callback_url in deploy-meta.json. Skip notify."
          exit 0
        fi

        mkdir -p fix_output

        if [ ! -f opa-response.json ]; then
          echo '{"result":{"deny":true}}' > opa-response.json
        fi

        if [ ! -f fix_output/fix_report.json ]; then
          echo '{"summary":{"total":0,"fixed":0,"skipped":0,"failed":1,"manual":0,"files_patched":0}}' > fix_output/fix_report.json
        fi

        if [ ! -f fix_output/PR_SUMMARY.md ]; then
          echo "# Scan summary unavailable" > fix_output/PR_SUMMARY.md
        fi

        jq -n \
          --arg deployment_id "$DEPLOYMENT_ID" \
          --arg repo "$REPO_NAME" \
          --arg commit "$COMMIT_SHA" \
          --arg branch "$BRANCH_NAME" \
          --arg tf_workdir "$TF_WORKDIR" \
          --arg pipeline_url "$PIPELINE_URL" \
          --rawfile summary_markdown fix_output/PR_SUMMARY.md \
          --slurpfile fix_report fix_output/fix_report.json \
          --slurpfile opa_response opa-response.json \
          '{
            deployment_id: $deployment_id,
            repo: $repo,
            commit: $commit,
            branch: $branch,
            tf_workdir: $tf_workdir,
            pipeline_url: $pipeline_url,
            opa: {
              deny: ($opa_response[0].result.deny // true)
            },
            summary_markdown: $summary_markdown,
            fix_report: $fix_report[0]
          }' > ingress-payload.json

        echo "===== ingress-payload.json ====="
        cat ingress-payload.json

        curl -k --fail -s -X POST "$CALLBACK_URL" \
          -H "Content-Type: application/json" \
          -H "X-CI-Token: $INGRESS_CALLBACK_TOKEN" \
          -d @ingress-payload.json

        echo "✅ OPA decision + scan summary sent to Ingress"

  # ── Step 7: Log to ELK ───────────────────────────────────────────────────
  - name: log-to-elk
    image: badouralix/curl-jq:latest
    when:
      status: [success, failure]
    commands:
      - echo "📤 Sending metrics to ELK Logstash..."
      - >
        curl --fail -s -X POST http://logstash:5055
        -H "Content-Type: application/json"
        -d @fix_output/fix_report.json
      - cat fix_output/fix_report.json
      - echo "✅ Logs successfully pushed to ELK"
# ── Step 8: Create Fix PR ─────────────────────────────────────────────────
  - name: create-fix-pr
    # Thay thế image cũ bằng image Alpine đã tích hợp sẵn Python3 và Git
    image: alpine:3.19
    when:
      event: push
      status: success
    environment:
      GITEA_URL:
        from_secret: GITEA_URL
      GITEA_TOKEN:
        from_secret: GITEA_TOKEN
    commands:
      # Alpine dùng 'apk' cài git và python chỉ mất đúng 1 giây, không cần update mỏi mắt
      - apk add --no-cache git python3
      
      - git config --global --add safe.directory '*'
      - echo "🚀 Creating fix PR if fixes were applied..."
      - python3 .woodpecker/iac-autofix/gitea_pr.py --fix-dir fix_output --report-json fix_output/fix_report.json --report-md fix_output/PR_SUMMARY.md
