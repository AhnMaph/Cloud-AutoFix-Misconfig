services:
  ingress:
    image: nginx:alpine
    container_name: ingress-control
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./ingress/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ingress/certs:/etc/nginx/certs:ro 
    depends_on:
      - frontend
      - backend
      - keycloak
    networks:
      - portal-net
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_PROXY: edge
      KC_HOSTNAME: hybridcompany.xyz  # Hoặc remi.hybridcompany.xyz nếu bạn dùng subdomain
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth

      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"

    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - portal-net
    restart: unless-stopped

  vault:
    image: hashicorp/vault:latest
    container_name: vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN:-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    networks:
      - portal-net

  vault-bootstrap:
    image: hashicorp/vault:latest
    container_name: vault-bootstrap
    depends_on:
      - vault
      - keycloak
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-root}
      AWS_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      VAULT_BROKER_AWS_ACCESS_KEY_ID: ${VAULT_BROKER_AWS_ACCESS_KEY_ID}
      VAULT_BROKER_AWS_SECRET_ACCESS_KEY: ${VAULT_BROKER_AWS_SECRET_ACCESS_KEY}
      KEYCLOAK_ISSUER: https://hybridcompany.xyz/auth/realms/hybrid-cloud
    volumes:
      - ./vault/bootstrap_vault_aws.sh:/bootstrap_vault_aws.sh:ro
    command: sh /bootstrap_vault_aws.sh
    networks:
      - portal-net
    restart: "no"

  backend:
    build:
      context: ./backend
    container_name: portal-backend
    environment:
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/auth
      KEYCLOAK_PUBLIC_URL: https://hybridcompany.xyz/auth
      KEYCLOAK_ISSUER: http://hybridcompany.xyz:8080/auth/realms/hybrid-cloud
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      FRONTEND_URL: https://hybridcompany.xyz
      CORS_ORIGINS: https://hybridcompany.xyz,http://localhost:5173
      SESSION_MAX_AGE_SECONDS: "2592000"
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: lax

      AWS_ACCOUNT_ID: ${AWS_ACCOUNT_ID}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_PROJECT_NAME: hybrid-portal
      TERRAFORM_STATE_ROOT: /app/tfstate
      AWS_TF_TEMPLATE_DIR: /app/terraform/aws/s3_private_bucket

      OPENSTACK_AUTH_URL: ${OPENSTACK_AUTH_URL}
      OPENSTACK_ADMIN_CLOUD: ${OPENSTACK_ADMIN_CLOUD:-kolla-admin}
      OPENSTACK_ADMIN_USERNAME: ${OPENSTACK_ADMIN_USERNAME}
      OPENSTACK_ADMIN_PASSWORD: ${OPENSTACK_ADMIN_PASSWORD}
      OPENSTACK_ADMIN_PROJECT: ${OPENSTACK_ADMIN_PROJECT:-admin}
      OPENSTACK_USER_DOMAIN_NAME: ${OPENSTACK_USER_DOMAIN_NAME:-Default}
      OPENSTACK_PROJECT_DOMAIN_NAME: ${OPENSTACK_PROJECT_DOMAIN_NAME:-Default}
      OPENSTACK_REGION_NAME: ${OPENSTACK_REGION_NAME:-RegionOne}
      OPENSTACK_INTERFACE: ${OPENSTACK_INTERFACE:-internal}
      OPENSTACK_IDENTITY_API_VERSION: ${OPENSTACK_IDENTITY_API_VERSION:-3}

      OPENSTACK_ENABLED: ${OPENSTACK_ENABLED:-false}
      OS_AUTH_URL: ${OS_AUTH_URL}
      OS_USERNAME: ${OS_USERNAME}
      OS_PASSWORD: ${OS_PASSWORD}
      OS_USER_DOMAIN_NAME: ${OS_USER_DOMAIN_NAME:-Default}
      OS_PROJECT_NAME: ${OS_PROJECT_NAME:-admin}
      OS_PROJECT_DOMAIN_NAME: ${OS_PROJECT_DOMAIN_NAME:-Default}
      OS_REGION_NAME: ${OS_REGION_NAME:-RegionOne}
      
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-${VAULT_ROOT_TOKEN:-root}}
      VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-kv}
      VAULT_BROKER_AWS_USER: vault-aws-broker
      KEYCLOAK_PIPELINE_CLIENT_ID: aws-pipeline-client
      KEYCLOAK_PIPELINE_AUDIENCE: account

      GITEA_URL: ${GITEA_URL}
      GITEA_OWNER: ${GITEA_OWNER}
      GITEA_USERNAME: ${GITEA_USERNAME}
      GITEA_TOKEN: ${GITEA_TOKEN}

      WOODPECKER_URL: ${WOODPECKER_URL}
      WOODPECKER_TOKEN: ${WOODPECKER_TOKEN}
      AUTO_ENABLE_WOODPECKER: ${AUTO_ENABLE_WOODPECKER:-true}

      # IAC_TEMPLATE_REPO_AWS: ${IAC_TEMPLATE_REPO_AWS}
      # IAC_TEMPLATE_REPO_OPENSTACK: ${IAC_TEMPLATE_REPO_OPENSTACK}
      IAC_TARGET_BRANCH: ${IAC_TARGET_BRANCH:-main}

      IAC_TEMPLATE_MODE: ${IAC_TEMPLATE_MODE:-local}
      IAC_TEMPLATE_DIR_AWS: ${IAC_TEMPLATE_DIR_AWS}
      IAC_TEMPLATE_DIR_OPENSTACK: ${IAC_TEMPLATE_DIR_OPENSTACK}

      IAC_PIPELINE_TEMPLATE_DIR_AWS: /iac-templates/aws-infrastructure-iac/.woodpecker
      IAC_PIPELINE_TEMPLATE_DIR_OPENSTACK: /iac-templates/openstack-infrastructure-iac/.woodpecker

      PIPELINE_KEYCLOAK_TOKEN_URL: ${PIPELINE_KEYCLOAK_TOKEN_URL}
      PIPELINE_VAULT_ADDR: ${PIPELINE_VAULT_ADDR}
      KEYCLOAK_PIPELINE_CLIENT_SECRET: ${KEYCLOAK_PIPELINE_CLIENT_SECRET}

      CI_CALLBACK_TOKEN: ${CI_CALLBACK_TOKEN}
      DEPLOYMENT_STORE_PATH: ${DEPLOYMENT_STORE_PATH:-/app/data/deployments.json}
      INGRESS_PUBLIC_URL: ${INGRESS_PUBLIC_URL}

      TENANT_REGISTRY_PATH: /app/data/tenants.json
    volumes:
      - terraform_state:/app/tfstate
      - tenant_data:/app/data
      - ../cicd/aws-infrastructure-iac:/iac-templates/aws-infrastructure-iac:ro
      - ../cicd/openstack-infrastructure-iac:/iac-templates/openstack-infrastructure-iac:ro
    networks:
      - portal-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_KEYCLOAK_URL: /auth
        VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM}
        VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
        VITE_BACKEND_URL: /api
        VITE_FRONTEND_URL: https://hybridcompany.xyz
    container_name: portal-frontend
    depends_on:
      - backend
    networks:
      - portal-net
    restart: unless-stopped

volumes:
  keycloak_data:
  terraform_state:
  tenant_data:

networks:
  portal-net:
    driver: bridge